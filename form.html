<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleiderspende - Spenden abgeben</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
<body>
    <header class="mb-4">
        <div class="container d-flex justify-content-between align-items-center flex-wrap">
            <div class="d-flex align-items-center">
                <img src="assets/logo.png" alt="Logo" height="55" class="me-3">
                <div>
                    <h1 class="mb-0">Kleiderspende</h1>
                    <small>Spende registrieren</small>
                </div>
            </div>
            <nav>
                <a href="index.html">Start</a>
            </nav>
        </div>
    </header>
    <div class="container my-5">
        <h2> Textilspenden abgeben</h2>
        <form id="spendenForm">

            <div class="mb-3">
                <label class="form-label">Art der Übergabe</label>
                <select class="form-select" id="art">
                    <option value="geschaeftsstelle">Übergaben an der Geschäftsstelle</option>
                    <option value="abholung">Abholung bei Ihnen vor Ort</option>
                </select>
            </div>
            <div class="mb-3" id="kontaktFeld">
                <label class="form-label">Kontakt (Telefon oder E-Mail)</label>
                <input type="text" class="form-control" id="kontakt" placeholder="z. B. 0176... oder max@beispiel.de">
            </div>
            <div class="mb-3" id="adresseFeld">
                <label class="form-label">Abholadresse (Postleitzahl - PLZ + Straße)</label>
                <input type="text" class="form-control" id="adresse">
            </div>
            <div class="mb-3">
                <label class="form-label">Art der Textilien/Kleidung</label>
                <input type="text" class="form-control" id="kleidung" />
            </div>
            <div class="mb-3">
                <label class="form-label">Kriesengebiet</label>
                <select class="form-select" id="krise">
                    <option value="ukraine">Ukraine</option>
                    <option value="syrien">Syrien</option>
                    <option value="afghanistan">Afghanistan</option>
                    <option value="iran">Iran</option>
                    <option value="deutschland">Deutschland - Obdachlosenhilfe</option>
                </select>
            </div>
            <button class="btn btn-primary">Spende anmelden</button>
        </form>
        <script src="js/script.js"></script>
    </div>
    <footer class="bg-light text-center p-2">
        <p>&copy; 2026 PG26Kleiderspende Verein</p>
        <p> Impressum | Datenschutz</p>
    </footer>
</body>
</html>
