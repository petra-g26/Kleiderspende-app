<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewpport" content="width=device-width, initial-scal=1.0">
    <title> Bestätigung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head> 

<body class="container my-5">
    <div class="card shadow p-4">
        <h1 class="text-success">Registrierung erfolgreich</h1>
        <p class="lead"> Vielen Dank für Ihre Textilspende</p>
        <hr>
        <div id="ausgabe"></div>
        <a href="index.html" class="btn btn-primary mt-3">Zur Startseite</a>
    </div>
    <script>
        const art = localStorage.getItem("art");
        const adresse = localStorage.getItem("adresse");
        const kleidung = localStorage.getItem("kleidung");
        const krise = localStorage.getItem("krise");
        const datum = localStorage.getItem("datum");
        if (krise) {
            kriseText = krise.charAt(0).toUpperCase() + krise.slice(1);
        }
        let ortText = "";

        if (art === "geschaeftsstelle") {
            ortText = "Übergabe an der Geschäftsstelle";
        } else {

            ortText = adresse;
        }
        document.getElementById("ausgabe").innerHTML =
            `<p><strong>Art der Übergabe:</strong> ${art}</p>
             <p><strong>Ort:</strong> ${ortText}</p>
             <p><strong>Art der Textilien/Kleidung:</strong> ${kleidung}</p>
             <p><strong>Kriesengebiet:</strong> ${kriseText}</p>
             <p><strong>Datum / Uhrzeit:</strong> ${datum}</p>`;
    </script>
    <footer class="bg-light text-center p-2">
        <p>&copy; 2026 PG26Kleiderspende Verein</p>
        <p> Impressum | Datenschutz</p>
    </footer>
</body>
</html>
